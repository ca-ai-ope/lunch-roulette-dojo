<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#f8fafc"/>
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Phase 3: 仕様駆動開発（SDD）の全体像</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748b">SPEC.md を SSoT（Single Source of Truth）にして AI の出力を収束させる</text>

  <!-- SPEC.md center -->
  <rect x="295" y="190" width="210" height="100" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="400" y="225" text-anchor="middle" font-size="18" font-weight="bold" fill="#92400e">SPEC.md</text>
  <text x="400" y="248" text-anchor="middle" font-size="12" fill="#92400e">Single Source of Truth</text>
  <text x="400" y="268" text-anchor="middle" font-size="11" fill="#a16207">Why / What / How / Edge Cases</text>

  <!-- Step 1: Specify -->
  <rect x="40" y="85" width="160" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Step 1</text>
  <text x="120" y="130" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">Specify</text>
  <text x="120" y="146" text-anchor="middle" font-size="10" fill="#3b82f6">仕様を書く（5分）</text>
  <!-- Arrow to SPEC.md -->
  <line x1="200" y1="135" x2="290" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Plan -->
  <rect x="40" y="200" width="160" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Step 2</text>
  <text x="120" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">Plan</text>
  <text x="120" y="261" text-anchor="middle" font-size="10" fill="#3b82f6">技術/制約を追記（2分）</text>
  <!-- Arrow to SPEC.md -->
  <line x1="200" y1="240" x2="290" y2="240" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Tasks -->
  <rect x="40" y="315" width="160" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Step 3</text>
  <text x="120" y="360" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">Tasks</text>
  <text x="120" y="376" text-anchor="middle" font-size="10" fill="#3b82f6">タスク分解（3分）</text>
  <!-- Arrow from SPEC.md -->
  <line x1="295" y1="270" x2="205" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Implement -->
  <rect x="40" y="430" width="160" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="457" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Step 4</text>
  <text x="120" y="475" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d">Implement</text>
  <text x="120" y="491" text-anchor="middle" font-size="10" fill="#22c55e">AI が実装（15分）</text>
  <!-- Arrow from Tasks -->
  <line x1="120" y1="385" x2="120" y2="425" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Implement reads SPEC.md -->
  <path d="M 200,465 Q 350,460 370,295" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="400" text-anchor="middle" font-size="10" fill="#64748b">参照</text>

  <!-- Human / AI labels -->
  <rect x="570" y="85" width="190" height="100" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="665" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d28d9">Human</text>
  <text x="665" y="130" text-anchor="middle" font-size="11" fill="#7c3aed">仕様を書く・判断する</text>
  <text x="665" y="148" text-anchor="middle" font-size="11" fill="#7c3aed">仕様変更を先に SPEC.md へ</text>
  <text x="665" y="166" text-anchor="middle" font-size="11" fill="#7c3aed">AI の出力を仕様と照合</text>

  <rect x="570" y="200" width="190" height="90" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="665" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="#0369a1">AI (Claude)</text>
  <text x="665" y="245" text-anchor="middle" font-size="11" fill="#0284c7">SPEC.md を参照して実装</text>
  <text x="665" y="263" text-anchor="middle" font-size="11" fill="#0284c7">仕様にないことはしない</text>
  <text x="665" y="281" text-anchor="middle" font-size="11" fill="#0284c7">出力が収束する</text>

  <!-- Arrows from roles to SPEC.md -->
  <line x1="570" y1="145" x2="510" y2="220" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="245" x2="510" y2="245" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Spec change event -->
  <rect x="540" y="340" width="220" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">仕様変更イベント</text>
  <text x="650" y="385" text-anchor="middle" font-size="11" fill="#b91c1c">1人1票 / 取り消し可能 /</text>
  <text x="650" y="401" text-anchor="middle" font-size="11" fill="#b91c1c">投票数リアルタイム反映</text>
  <text x="650" y="421" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">まず SPEC.md を更新 → コード修正</text>
  <!-- Arrow to SPEC.md -->
  <line x1="540" y1="380" x2="510" y2="275" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- Skills -->
  <rect x="540" y="455" width="105" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="592" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">/spec-check</text>
  <rect x="655" y="455" width="105" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="707" y="480" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">/implement</text>
</svg>
